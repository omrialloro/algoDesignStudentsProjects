<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Behavioral Canvas – Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #050505;
      font-family: Verdana, Geneva, sans-serif;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
/*
  PROJECT: Behavioral Canvas – VIEWER (Final V5)
*/

let loadedFiles = [];
let safeArea = { x: 20, y: 20, w: 0, h: 0 };
let sidebarW = 340; 

// UI Controls
let inputBtn, clearBtn, toggleBtn;
let selFilterGender, selFilterHand, selFilterAge, selFilterTime;
let viewMode = 0; // 0=Neon, 1=Heatmap

// Active Filters
let activeFilters = { gender: "All", hand: "All", age: "All", time: "All" };

// Colors
const C_BG = "#050505";       
const C_PANEL = "rgba(20, 20, 25, 0.95)"; 
const C_ACCENT_A = "#00F3FF"; // Cyan
const C_ACCENT_B = "#FF4000"; // Orange

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  updateSafeArea();

  // 1. כפתורי פעולה
  inputBtn = createFileInput(handleFile); inputBtn.elt.multiple = true; styleElement(inputBtn, 20, 90);
  toggleBtn = createButton("VIEW MODE: NEON PATHS"); toggleBtn.mousePressed(toggleView); styleElement(toggleBtn, 20, 140);
  clearBtn = createButton("RESET DATA"); clearBtn.mousePressed(resetData); styleElement(clearBtn, 20, 190);
  
  // 2. יצירת מסננים
  createFilterControls();

  noLoop();
}

function createFilterControls() {
  let startY = 280; 
  let gap = 50; 

  selFilterGender = createSelect();
  selFilterGender.option('Gender: All', 'All');
  selFilterGender.option('Female', 'אישה');
  selFilterGender.option('Male', 'גבר');
  selFilterGender.changed(() => { activeFilters.gender = selFilterGender.value(); redraw(); });
  styleElement(selFilterGender, 20, startY);
  
  selFilterHand = createSelect();
  selFilterHand.option('Hand: All', 'All');
  selFilterHand.option('Right Handed', 'ימין');
  selFilterHand.option('Left Handed', 'שמאל');
  selFilterHand.changed(() => { activeFilters.hand = selFilterHand.value(); redraw(); });
  styleElement(selFilterHand, 20, startY + gap);

  selFilterAge = createSelect();
  selFilterAge.option('Age Group: All', 'All');
  selFilterAge.option('Young (18-24)', '18-24');
  selFilterAge.option('Adults (25-40)', '25-40');
  selFilterAge.option('Middle Age (41-60)', '41-60');
  selFilterAge.option('Senior (60+)', '60+');
  selFilterAge.changed(() => { activeFilters.age = selFilterAge.value(); redraw(); });
  styleElement(selFilterAge, 20, startY + gap * 2);

  selFilterTime = createSelect();
  selFilterTime.option('Time of Day: All', 'All');
  selFilterTime.option('Morning (06:00-12:00)', 'Morning');
  selFilterTime.option('Afternoon (12:00-18:00)', 'Afternoon');
  selFilterTime.option('Evening (18:00-24:00)', 'Evening');
  selFilterTime.option('Night (00:00-06:00)', 'Night');
  selFilterTime.changed(() => { activeFilters.time = selFilterTime.value(); redraw(); });
  styleElement(selFilterTime, 20, startY + gap * 3);
}

function draw() {
  background(C_BG);
  drawBackgroundGrid();

  if (loadedFiles.length > 0) {
    if (viewMode === 0) drawNeonPaths();
    else drawPlasmaHeatmap();
  } else {
    drawEmptyState();
  }
  drawSidebarPanel();
}

// === LOGIC: CHECK FILTERS ===
function matchFilter(file) {
  let demo = file.meta.demographics || (file.trials[0] ? file.trials[0].demographics : null);
  let timestamp = file.meta.timestamp || "";
  
  if (!demo) return true; 

  let gMatch = (activeFilters.gender === 'All') || (demo.gender === activeFilters.gender);
  let hMatch = (activeFilters.hand === 'All') || (demo.hand === activeFilters.hand);
  
  let aMatch = true;
  if (activeFilters.age !== 'All') {
    let age = parseInt(demo.age);
    if (!isNaN(age)) {
      if (activeFilters.age === '18-24') aMatch = (age >= 18 && age <= 24);
      else if (activeFilters.age === '25-40') aMatch = (age >= 25 && age <= 40);
      else if (activeFilters.age === '41-60') aMatch = (age >= 41 && age <= 60);
      else if (activeFilters.age === '60+') aMatch = (age > 60);
    }
  }

  let tMatch = true;
  if (activeFilters.time !== 'All' && timestamp.includes(',')) {
    try {
      let timePart = timestamp.split(',')[1].trim(); 
      let hour = parseInt(timePart.split(':')[0]);   
      if (activeFilters.time === 'Morning') tMatch = (hour >= 6 && hour < 12);
      else if (activeFilters.time === 'Afternoon') tMatch = (hour >= 12 && hour < 18);
      else if (activeFilters.time === 'Evening') tMatch = (hour >= 18 && hour < 24);
      else if (activeFilters.time === 'Night') tMatch = (hour >= 0 && hour < 6);
    } catch(e) { }
  }

  return gMatch && hMatch && aMatch && tMatch;
}

// === VISUALIZATION ===

function drawNeonPaths() {
  blendMode(ADD); noFill(); strokeWeight(1.5);
  for (let file of loadedFiles) {
    if (!matchFilter(file)) continue; 

    let srcW = file.meta.canvasW || width; let srcH = file.meta.canvasH || height;
    for (let t of file.trials) {
      if (t.choice === "A") stroke(0, 243, 255, 60); else stroke(255, 64, 0, 60);
      beginShape();
      for (let p of t.pathData) {
        let px = map(p.x, 0, srcW, safeArea.x, safeArea.x + safeArea.w);
        let py = map(p.y, 0, srcH, safeArea.y, safeArea.y + safeArea.h);
        vertex(px, py);
      }
      endShape();
    }
  }
  blendMode(BLEND);
}

function drawPlasmaHeatmap() {
  noStroke();
  let gridSize = 12; let cols = floor(safeArea.w/gridSize); let rows = floor(safeArea.h/gridSize);
  let grid = Array.from({length:cols},()=>Array(rows).fill(0)); let maxVal = 1;

  for (let file of loadedFiles) {
    if (!matchFilter(file)) continue; 

    let srcW = file.meta.canvasW || width; let srcH = file.meta.canvasH || height;
    for (let t of file.trials) {
      for (let p of t.pathData) {
        let px = map(p.x,0,srcW,0,cols-1); let py = map(p.y,0,srcH,0,rows-1);
        let c = floor(px), r = floor(py);
        if(c>=0&&c<cols&&r>=0&&r<rows) { grid[c][r]++; if(grid[c][r]>maxVal) maxVal=grid[c][r]; }
      }
    }
  }
  for(let i=0;i<cols;i++){for(let j=0;j<rows;j++){let v=grid[i][j]; if(v>0){
    let d=map(v,0,maxVal*0.6,0,1,true); fill(getHeatmapColor(d));
    rect(safeArea.x+i*gridSize,safeArea.y+j*gridSize,gridSize,gridSize);
  }}}
}

function getHeatmapColor(t) {
  let c1=color(10,10,80,50), c2=color(100,0,200,150), c3=color(255,0,100,200), c4=color(255,220,100,255);
  if(t<0.33)return lerpColor(c1,c2,t*3); if(t<0.66)return lerpColor(c2,c3,(t-0.33)*3); return lerpColor(c3,c4,(t-0.66)*3);
}

// === SIDEBAR UI ===

function drawSidebarPanel() {
  noStroke(); fill(C_PANEL); rect(width-sidebarW,0,sidebarW,height);
  stroke(C_ACCENT_A); strokeWeight(2); line(width-sidebarW,0,width-sidebarW,height);
  noStroke(); textAlign(LEFT,TOP); let px = width-sidebarW+25;

  fill(C_ACCENT_A); textFont('Verdana'); textStyle(BOLD); textSize(20); text("BEHAVIORAL LAB", px, 30);
  fill(255); textSize(14); text("DATA FILTERS:", px, 260);
  
  let statsY = 490;
  stroke(80); line(width-sidebarW+10,statsY-20,width-10,statsY-20); noStroke();
  fill(255); textStyle(BOLD); textSize(16); text("FILTERED ANALYTICS:", px, statsY);
  
  let stats = calculateStats();
  textStyle(NORMAL); textSize(14); fill(220);
  
  text(`Users Shown: ${stats.users}`, px, statsY+30);
  text(`Total Paths:  ${stats.paths}`, px, statsY+55);
  fill(0, 255, 0); 
  text(`Avg Duration: ${stats.avgDur} sec`, px, statsY+80); 
  
  fill(C_ACCENT_A); text(`Option A:     ${stats.a}`, px, statsY+110);
  fill(C_ACCENT_B); text(`Option B:     ${stats.b}`, px, statsY+135);

  drawLegend(px, height - 160);
}

function drawLegend(x, y) {
  stroke(80); line(width-sidebarW+10, y-20, width-10, y-20); noStroke();
  fill(255); textStyle(BOLD); textSize(14); text("LEGEND:", x, y);
  
  let startY = y + 25; textSize(12); textStyle(NORMAL);
  
  if (viewMode === 0) {
    fill(C_ACCENT_A); rect(x, startY, 15, 15); fill(200); text("Option A (Left)", x+25, startY+12);
    fill(C_ACCENT_B); rect(x, startY+25, 15, 15); fill(200); text("Option B (Right)", x+25, startY+37);
  } else {
    text("Density / Dwell Time:", x, startY);
    let barW = sidebarW - 60; let barH = 15;
    for (let i = 0; i < barW; i++) {
      let t = map(i, 0, barW, 0, 1); fill(getHeatmapColor(t)); rect(x + i, startY + 15, 1, barH);
    }
    fill(200); textSize(10); text("Low", x, startY + 45); textAlign(RIGHT); text("High", x + barW, startY + 45); textAlign(LEFT);
  }
}

function calculateStats() {
  let users=0, paths=0, a=0, b=0, totalDur=0;
  for (let file of loadedFiles) {
    if (!matchFilter(file)) continue;
    users++; paths += file.trials.length;
    let dur = parseFloat(file.meta.duration_sec);
    if (!isNaN(dur)) totalDur += dur;
    for(let t of file.trials) { if(t.choice==="A") a++; else b++; }
  }
  let avgDur = users > 0 ? (totalDur / users).toFixed(1) : "0.0";
  return { users, paths, a, b, avgDur };
}

function handleFile(file) {
  if (file.subtype==='json'||file.name.endsWith('.json')) {
    let data=file.data;
    let standardized={meta:data.meta||{canvasW:width,canvasH:height},trials:Array.isArray(data)?data:(data.trials||[])};
    loadedFiles.push(standardized); redraw();
  } else alert("Please select JSON files only.");
}
function resetData(){loadedFiles=[]; inputBtn.value(''); redraw();}
function toggleView(){viewMode=(viewMode+1)%2; toggleBtn.html(viewMode===0?"VIEW MODE: NEON PATHS":"VIEW MODE: HEATMAP"); redraw();}
function updateSafeArea(){safeArea={x:40,y:40,w:width-sidebarW-60,h:height-80};}
function drawBackgroundGrid(){stroke(255,15); strokeWeight(1); for(let x=safeArea.x;x<safeArea.w+safeArea.x;x+=50)line(x,safeArea.y,x,safeArea.h+safeArea.y); for(let y=safeArea.y;y<safeArea.h+safeArea.y;y+=50)line(safeArea.x,y,safeArea.x+safeArea.w,y); noFill(); stroke(50); rect(safeArea.x,safeArea.y,safeArea.w,safeArea.h);}
function drawEmptyState(){textAlign(CENTER,CENTER); fill(100); textSize(16); text("NO DATA LOADED", safeArea.x+safeArea.w/2, safeArea.y+safeArea.h/2); fill(60); textSize(12); text("Load JSON files from the panel", safeArea.x+safeArea.w/2, safeArea.y+safeArea.h/2+25);}
function styleElement(el,r,t){el.position(windowWidth-sidebarW+r,t); el.style('width',(sidebarW-50)+'px'); el.style('background','#111'); el.style('color',C_ACCENT_A); el.style('border','1px solid '+C_ACCENT_A); el.style('padding','5px');}
function windowResized(){resizeCanvas(windowWidth,windowHeight); updateSafeArea(); styleElement(inputBtn,20,90); styleElement(toggleBtn,20,140); styleElement(clearBtn,20,190); styleElement(selFilterGender,20,280); styleElement(selFilterHand,20,330); styleElement(selFilterAge,20,380); styleElement(selFilterTime,20,430); redraw();}
</script>
</body>
</html>
