<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ בוט זיהוי רעילות בעברית - מערכת מתקדמת</title>
    <style>
        :root {
            --color-bg: #0f172a;
            --color-surface: #1e293b;
            --color-primary: #06b6d4;
            --color-success: #10b981;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
            --color-text: #f8fafc;
            --color-text-dim: #94a3b8;
            --color-border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, var(--color-surface) 0%, #0f172a 100%);
            border-radius: 16px;
            border: 1px solid var(--color-border);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--color-text-dim);
            font-size: 1.1rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--color-surface);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--color-border);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 16px;
            color: var(--color-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            padding: 16px;
            background: var(--color-bg);
            border: 2px solid var(--color-border);
            border-radius: 8px;
            color: var(--color-text);
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
        }

        .btn-primary:hover {
            background: #0891b2;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(6, 182, 212, 0.3);
        }

        .btn-secondary {
            background: var(--color-border);
            color: var(--color-text);
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-danger {
            background: var(--color-danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .score-display {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: var(--color-bg);
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid var(--color-border);
        }

        .score-value {
            font-size: 3rem;
            font-weight: bold;
        }

        .score-low { color: var(--color-success); }
        .score-medium { color: var(--color-warning); }
        .score-high { color: var(--color-danger); }

        .score-label {
            font-size: 1.2rem;
            color: var(--color-text-dim);
        }

        .results-container {
            max-height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .results-container::-webkit-scrollbar {
            width: 8px;
        }

        .results-container::-webkit-scrollbar-track {
            background: var(--color-bg);
            border-radius: 4px;
        }

        .results-container::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 4px;
        }

        .results-container::-webkit-scrollbar-thumb:hover {
            background: var(--color-primary);
        }

        .result-item {
            background: var(--color-bg);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-right: 4px solid var(--color-primary);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .result-match {
            font-weight: bold;
            color: var(--color-primary);
            font-size: 1.1rem;
        }

        .result-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-low { background: rgba(16, 185, 129, 0.2); color: var(--color-success); }
        .badge-medium { background: rgba(245, 158, 11, 0.2); color: var(--color-warning); }
        .badge-high { background: rgba(239, 68, 68, 0.2); color: var(--color-danger); }

        .result-details {
            display: grid;
            gap: 8px;
            margin-top: 12px;
            font-size: 0.95rem;
        }

        .result-detail {
            display: flex;
            gap: 8px;
        }

        .result-label {
            color: var(--color-text-dim);
            min-width: 100px;
        }

        .result-value {
            color: var(--color-text);
        }

        .safe-alternative {
            background: rgba(16, 185, 129, 0.1);
            padding: 12px;
            border-radius: 6px;
            margin-top: 8px;
            border-right: 3px solid var(--color-success);
        }

        .safe-alternative-label {
            color: var(--color-success);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .stat-card {
            background: var(--color-bg);
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--color-primary);
        }

        .stat-label {
            color: var(--color-text-dim);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .sequence-alert {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid var(--color-danger);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .sequence-alert-title {
            color: var(--color-danger);
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-dim);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid var(--color-border);
            border-top: 4px solid var(--color-primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .category-group {
            margin-bottom: 24px;
        }

        .category-header {
            background: var(--color-bg);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-name {
            font-weight: bold;
            color: var(--color-primary);
            font-size: 1.1rem;
        }

        .category-count {
            background: var(--color-primary);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
        }

        .json-output {
            background: var(--color-bg);
            padding: 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            max-height: 400px;
            overflow-y: auto;
            direction: ltr;
            text-align: left;
        }

        .copy-btn {
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ בוט זיהוי רעילות בעברית</h1>
            <p class="subtitle">מערכת מתקדמת לזיהוי וניתוח דפוסי תקשורת רעילים | כולל רעילות עקיפה וסרקזם</p>
        </header>

        <div class="main-grid">
            <div class="card">
                <h2>📝 הזן טקסט לניתוח</h2>
                <textarea id="inputText" placeholder="הדבק או הקלד טקסט כאן לניתוח רעילות...&#10;&#10;דוגמה:&#10;אתה תמיד טועה, זה מה שאתה טוב בו.&#10;סליחה שאני נושם כנראה.&#10;אתה לא מספיק טוב לזה."></textarea>
                <div class="btn-group">
                    <button class="btn-primary" onclick="analyzeText()">
                        🔍 נתח טקסט
                    </button>
                    <button class="btn-secondary" onclick="clearInput()">
                        🗑️ נקה
                    </button>
                    <button class="btn-secondary" onclick="loadExample()">
                        💡 דוגמה
                    </button>
                </div>
            </div>

            <div class="card">
                <h2>📊 תוצאות ניתוח</h2>
                <div class="score-display">
                    <div>
                        <div class="score-value" id="scoreValue">0</div>
                        <div class="score-label">ניקוד רעילות</div>
                    </div>
                    <div id="scoreMeter">📊</div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalMatches">0</div>
                        <div class="stat-label">התאמות</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="categoriesCount">0</div>
                        <div class="stat-label">קטגוריות</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="bonusScore">0</div>
                        <div class="stat-label">בונוס רצפים</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🔎 פירוט תוצאות</h2>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 12px;">מנתח טקסט...</p>
            </div>
            <div class="results-container" id="resultsContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">🔍</div>
                    <p>לא בוצע ניתוח עדיין</p>
                    <p style="margin-top: 8px; font-size: 0.9rem;">הזן טקסט ולחץ על "נתח טקסט"</p>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📤 ייצוא נתונים</h2>
            <div class="btn-group">
                <button class="btn-primary" onclick="exportJSON()">
                    💾 ייצא JSON
                </button>
                <button class="btn-secondary" onclick="copyJSON()">
                    📋 העתק JSON
                </button>
            </div>
            <div id="jsonOutput" class="json-output" style="display: none; margin-top: 16px;"></div>
        </div>
    </div>

    <script>
        // Built-in lexicon data (embedded from files)
        const TOXIC_LEXICON = [
            {"id":"GAS_001","category":"גזלייטינג","subcategory":"הכחשת מציאות","pattern_type":"ביטוי","regex":"(זה\\s+)?לא\\s+קרה(\\s+ככה)?","toxicity_weight":4,"confidence_hint":"גבוה","rationale":"הכחשת אירועים שקרו","safe_alternative":"אני זוכר את זה אחרת, בואו נבדוק יחד"},
            {"id":"GAS_002","category":"גזלייטינג","subcategory":"ערעור תפיסה","pattern_type":"ביטוי","regex":"אתה\\s+מדמיין|את\\s+מדמיינת","toxicity_weight":5,"confidence_hint":"גבוה","rationale":"טענה שהאדם השני לא תופס את המציאות נכון","safe_alternative":"אולי יש לנו תפיסות שונות של המצב"},
            {"id":"MIN_001","category":"השפלה/הקטנה","subcategory":"ביטול יכולת","pattern_type":"ביטוי","regex":"(את|אתה)\\s+לא\\s+מספיק(\\s+טוב(ה)?)?","toxicity_weight":6,"confidence_hint":"גבוה","rationale":"השפלה ישירה של יכולות","safe_alternative":"יש פה פער שצריך לצמצם"},
            {"id":"BLM_001","category":"האשמה והצדקת תוקפנות","subcategory":"היפוך אחריות","pattern_type":"ביטוי","regex":"ראה\\s+מה\\s+גרמת\\s+לי|תראי\\s+מה\\s+גרמת\\s+לי","toxicity_weight":5,"confidence_hint":"גבוה","rationale":"העברת אחריות על תוקפנות","safe_alternative":"אני כועס, אבל זו בחירה שלי"},
            {"id":"CTL_001","category":"שליטה וקנאה","subcategory":"מגבלות תנועה","pattern_type":"ביטוי","regex":"לא\\s+תלכי?\\s+ל|אני\\s+לא\\s+נותן\\s+לך\\s+ל","toxicity_weight":6,"confidence_hint":"גבוה","rationale":"הגבלת חופש תנועה","safe_alternative":"אני מרגיש לא בנוח כשאת הולכת ל..."},
            {"id":"ISO_001","category":"בידוד חברתי","subcategory":"ניתוק מקרובים","pattern_type":"ביטוי","regex":"החברות\\s+שלך\\s+לא\\s+טובות|החברים\\s+שלך\\s+לא\\s+טובים","toxicity_weight":5,"confidence_hint":"גבוה","rationale":"ניסיון לבודד מסביבה חברתית","safe_alternative":"אולי נוכל לדבר על הדינמיקה עם החברים"},
            {"id":"ULT_001","category":"לחץ ואולטימטום","subcategory":"איום בעזיבה","pattern_type":"ביטוי","regex":"אם\\s+לא\\s+תעשי?\\s+.*אני\\s+עוזב","toxicity_weight":6,"confidence_hint":"גבוה","rationale":"איום רגשי לכפות החלטה","safe_alternative":"אני צריך שנדבר על הציפיות שלי"}
        ];

        const INDIRECT_LEXICON = [
            {"id":2001,"category":"רעילות עקיפה","subcategory":"סרקזם","regex":"סליחה\\s+שאני\\s+[^\\s]{2,}","toxicity_weight":3,"confidence_hint":"בינוני","rationale":"סרקזם שמתבטא בהתנצלות תוקפנית","safe_alternative":"במקום להיות סרקסטי, ניתן לשאול ישירות"},
            {"id":2002,"category":"רעילות עקיפה","subcategory":"אישום מרומז","regex":"תמיד\\s+אני\\s+האשם|אני\\s+תמיד\\s+האשם","toxicity_weight":4,"confidence_hint":"גבוה","rationale":"האצלה סרקסטית של אשמה","safe_alternative":"בוא נבדוק יחד מה קרה"},
            {"id":2003,"category":"רעילות עקיפה","subcategory":"הכחשה פסיבית","regex":"לא\\s+אמרתי.*אתה\\s+מדמיין|לא\\s+זכור\\s+לי\\s+שאמרתי","toxicity_weight":5,"confidence_hint":"גבוה","rationale":"גזלייטינג עקיף","safe_alternative":"ייתכן שלא הבנתי, ננסה ליישר קו?"},
            {"id":2004,"category":"רעילות עקיפה","subcategory":"עקיצה שקטה","regex":"צודקת?\\s+תמיד|אתה?\\s+צודק\\s+תמיד","toxicity_weight":3,"confidence_hint":"בינוני","rationale":"מחמאה מדומה עם בוז","safe_alternative":"אפשר לנסח אי הסכמה בלי לעקוץ"}
        ];

        const TOXIC_SEQUENCES = [
            {"id":"SEQ_001","name":"הסלמה קלאסית","sequence":["השפלה/הקטנה","האשמה והצדקת תוקפנות","לחץ ואולטימטום"],"bonus_score":15},
            {"id":"SEQ_002","name":"שליטה→בידוד","sequence":["שליטה וקנאה","בידוד חברתי"],"bonus_score":12},
            {"id":"SEQ_003","name":"גזלייטינג חוזר","sequence":["גזלייטינג","גזלייטינג","גזלייטינג"],"bonus_score":10}
        ];

        let currentAnalysis = null;

        // Text normalization
        function normalizeText(text) {
            return text
                .normalize("NFKC")
                .replace(/[\u0591-\u05C7]/g, "")
                .replace(/["'!?.,\-—;:()\[\]{}]/g, " ")
                .replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, "")
                .replace(/[ך]/g, "כ").replace(/[ם]/g, "מ").replace(/[ן]/g, "נ")
                .replace(/[ף]/g, "פ").replace(/[ץ]/g, "צ")
                .replace(/(.)\\1{2,}/g, "$1$1")
                .replace(/\s+/g, " ").trim();
        }

        // Detect sequences
        function detectSequences(results, sequences) {
            const categories = results.map(r => r.category);
            const matched = [];
            
            for (const seq of sequences) {
                let foundAll = true;
                for (const cat of seq.sequence) {
                    if (!categories.includes(cat)) {
                        foundAll = false;
                        break;
                    }
                }
                if (foundAll) {
                    matched.push({
                        id: seq.id,
                        name: seq.name,
                        bonus: seq.bonus_score || 5,
                        sequence: seq.sequence
                    });
                }
            }
            
            return matched;
        }

        // Main analysis function
        function analyze(text) {
            const results = [];
            const normText = normalizeText(text);
            const allLexicon = [...TOXIC_LEXICON, ...INDIRECT_LEXICON];

            for (const entry of allLexicon) {
                try {
                    const regex = new RegExp(entry.regex, "gi");
                    let match;
                    while ((match = regex.exec(normText))) {
                        results.push({
                            match: match[0],
                            index: match.index,
                            category: entry.category,
                            subcategory: entry.subcategory,
                            weight: entry.toxicity_weight || 3,
                            id: entry.id,
                            confidence: entry.confidence_hint || "בינוני",
                            rationale: entry.rationale || null,
                            safe_alternative: entry.safe_alternative || null
                        });
                    }
                } catch (err) {
                    console.warn("Invalid regex in entry", entry);
                }
            }

            const sequenceHits = detectSequences(results, TOXIC_SEQUENCES);
            const baseScore = results.reduce((sum, r) => sum + r.weight, 0);
            const bonus = sequenceHits.reduce((s, sObj) => s + sObj.bonus, 0);
            const score = Math.min(100, baseScore + bonus);

            const grouped = {};
            results.forEach(r => {
                if (!grouped[r.category]) grouped[r.category] = [];
                grouped[r.category].push(r);
            });

            return {
                original: text,
                normalized: normText,
                score,
                bonus,
                results,
                by_category: grouped,
                matched_sequences: sequenceHits
            };
        }

        // Analyze button click
        function analyzeText() {
            const text = document.getElementById('inputText').value.trim();
            
            if (!text) {
                alert('אנא הזן טקסט לניתוח');
                return;
            }

            const loading = document.getElementById('loading');
            const resultsContainer = document.getElementById('resultsContainer');
            
            loading.classList.add('active');
            resultsContainer.innerHTML = '';

            setTimeout(() => {
                currentAnalysis = analyze(text);
                displayResults(currentAnalysis);
                loading.classList.remove('active');
            }, 500);
        }

        // Display results
        function displayResults(analysis) {
            const scoreValue = document.getElementById('scoreValue');
            const scoreMeter = document.getElementById('scoreMeter');
            const totalMatches = document.getElementById('totalMatches');
            const categoriesCount = document.getElementById('categoriesCount');
            const bonusScore = document.getElementById('bonusScore');
            const resultsContainer = document.getElementById('resultsContainer');

            // Update score
            scoreValue.textContent = analysis.score;
            scoreValue.className = 'score-value';
            
            if (analysis.score < 30) {
                scoreValue.classList.add('score-low');
                scoreMeter.textContent = '✅';
            } else if (analysis.score < 60) {
                scoreValue.classList.add('score-medium');
                scoreMeter.textContent = '⚠️';
            } else {
                scoreValue.classList.add('score-high');
                scoreMeter.textContent = '🚨';
            }

            // Update stats
            totalMatches.textContent = analysis.results.length;
            categoriesCount.textContent = Object.keys(analysis.by_category).length;
            bonusScore.textContent = analysis.bonus;

            // Display results
            resultsContainer.innerHTML = '';

            // Sequences alert
            if (analysis.matched_sequences.length > 0) {
                const seqAlert = document.createElement('div');
                seqAlert.className = 'sequence-alert';
                seqAlert.innerHTML = `
                    <div class="sequence-alert-title">🚨 זוהו רצפים מסוכנים</div>
                    ${analysis.matched_sequences.map(s => `
                        <div style="margin-top: 8px;">
                            <strong>${s.name}</strong> (+${s.bonus} נקודות)
                            <div style="font-size: 0.9rem; color: var(--color-text-dim); margin-top: 4px;">
                                ${s.sequence.join(' → ')}
                            </div>
                        </div>
                    `).join('')}
                `;
                resultsContainer.appendChild(seqAlert);
            }

            // Results by category
            if (analysis.results.length === 0) {
                resultsContainer.innerHTML += `
                    <div class="empty-state">
                        <div class="empty-state-icon">✅</div>
                        <p>לא זוהתה רעילות בטקסט</p>
                        <p style="margin-top: 8px; font-size: 0.9rem;">הטקסט נראה תקין</p>
                    </div>
                `;
            } else {
                for (const [category, items] of Object.entries(analysis.by_category)) {
                    const categoryGroup = document.createElement('div');
                    categoryGroup.className = 'category-group';
                    
                    categoryGroup.innerHTML = `
                        <div class="category-header">
                            <div class="category-name">${category}</div>
                            <div class="category-count">${items.length}</div>
                        </div>
                    `;

                    items.forEach(item => {
                        const resultItem = document.createElement('div');
                        resultItem.className = 'result-item';
                        
                        const badgeClass = item.weight <= 2 ? 'badge-low' : 
                                         item.weight <= 4 ? 'badge-medium' : 'badge-high';
                        
                        resultItem.innerHTML = `
                            <div class="result-header">
                                <div class="result-match">"${item.match}"</div>
                                <div class="result-badge ${badgeClass}">משקל: ${item.weight}</div>
                            </div>
                            <div class="result-details">
                                <div class="result-detail">
                                    <span class="result-label">קטגוריה:</span>
                                    <span class="result-value">${item.subcategory || category}</span>
                                </div>
                                <div class="result-detail">
                                    <span class="result-label">רמת ביטחון:</span>
                                    <span class="result-value">${item.confidence}</span>
                                </div>
                                ${item.rationale ? `
                                    <div class="result-detail">
                                        <span class="result-label">הסבר:</span>
                                        <span class="result-value">${item.rationale}</span>
                                    </div>
                                ` : ''}
                            </div>
                            ${item.safe_alternative ? `
                                <div class="safe-alternative">
                                    <div class="safe-alternative-label">💡 חלופה מומלצת:</div>
                                    <div>${item.safe_alternative}</div>
                                </div>
                            ` : ''}
                        `;
                        
                        categoryGroup.appendChild(resultItem);
                    });

                    resultsContainer.appendChild(categoryGroup);
                }
            }
        }

        // Clear input
        function clearInput() {
            document.getElementById('inputText').value = '';
            document.getElementById('resultsContainer').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">🔍</div>
                    <p>לא בוצע ניתוח עדיין</p>
                    <p style="margin-top: 8px; font-size: 0.9rem;">הזן טקסט ולחץ על "נתח טקסט"</p>
                </div>
            `;
            document.getElementById('scoreValue').textContent = '0';
            document.getElementById('totalMatches').textContent = '0';
            document.getElementById('categoriesCount').textContent = '0';
            document.getElementById('bonusScore').textContent = '0';
            document.getElementById('scoreMeter').textContent = '📊';
        }

        // Load example
        function loadExample() {
            const example = `אתה תמיד טועה, זה מה שאתה טוב בו.
סליחה שאני נושם כנראה.
אתה לא מספיק טוב לזה.
ראה מה גרמת לי לעשות.`;
            document.getElementById('inputText').value = example;
        }

        // Export JSON
        function exportJSON() {
            if (!currentAnalysis) {
                alert('אנא נתח טקסט תחילה');
                return;
            }

            const jsonOutput = document.getElementById('jsonOutput');
            jsonOutput.style.display = 'block';
            jsonOutput.textContent = JSON.stringify(currentAnalysis, null, 2);
        }

        // Copy JSON
        function copyJSON() {
            if (!currentAnalysis) {
                alert('אנא נתח טקסט תחילה');
                return;
            }

            const json = JSON.stringify(currentAnalysis, null, 2);
            navigator.clipboard.writeText(json).then(() => {
                alert('JSON הועתק ללוח');
            });
        }
    </script>
</body>
</html>
